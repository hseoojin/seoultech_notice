name: 학교 공지 확인

on:
  schedule:
    # 한국시간(KST) 기준 06:00 / 12:00 / 18:00 / 00:00 에 실행
    # (KST = UTC+9 이므로 UTC로는 21:00 / 03:00 / 09:00 / 15:00)
    - cron: "0 21 * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}  # 필요하면 GitHub 웹사이트에서 수동 실행도 가능

permissions:
  contents: write  # seen_notices.json 자동 커밋을 위해 필요

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 필요한 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 공지 확인 스크립트 실행
        env:
          DISCORD_WEBHOOK_URL_NOTICE: ${{ secrets.DISCORD_WEBHOOK_URL_NOTICE }}
          DISCORD_WEBHOOK_URL_MATTERS: ${{ secrets.DISCORD_WEBHOOK_URL_MATTERS }}
          DISCORD_WEBHOOK_URL_HOUSING: ${{ secrets.DISCORD_WEBHOOK_URL_HOUSING }}
        run: python notice_checker.py

      - name: 확인 기록 커밋
        run: |
          git config user.name "notice-bot"
          git config user.email "notice-bot@users.noreply.github.com"
          git add seen_notices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update seen notices"
          git push